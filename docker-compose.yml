services:
  mysql:
    image: mysql:8.4
    container_name: consultbridge-mysql
    restart: unless-stopped
    command: ["--port=3310"]
    environment:
      MYSQL_ROOT_PASSWORD: Group28_CPT202
      MYSQL_DATABASE: consulting_booking
      MYSQL_USER: booking_user
      MYSQL_PASSWORD: booking_pass
    ports:
      - "3310:3310"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3310 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consultbridge-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3310
      MYSQL_DATABASE: consulting_booking
      MYSQL_USERNAME: booking_user
      MYSQL_PASSWORD: booking_pass
    ports:
      - "8080:8080"

volumes:
  mysql_data:
